<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SkyWatch — مراقبة الطيران المباشر</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{
  --bg:#060b14;--sf:#0c1520;--sf2:#101c2c;--bd:#18304a;
  --tx:#b8cfe8;--dim:#4a6a88;--ac:#00c8f0;
  --mil:#ff3040;--civ:#00df6a;--drn:#cccccc;--hel:#ffd000;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:'Tajawal',sans-serif;background:var(--bg);color:var(--tx);display:flex;flex-direction:column}
header{display:flex;align-items:center;justify-content:space-between;padding:0 18px;height:52px;background:var(--sf);border-bottom:1px solid var(--bd);flex-shrink:0;z-index:1000;box-shadow:0 2px 20px rgba(0,0,0,.5)}
.logo{display:flex;align-items:center;gap:9px}
.logo svg{width:32px;height:32px}
.logo-t{font-size:19px;font-weight:900;color:#fff;letter-spacing:-.5px}
.logo-t span{color:var(--ac)}
.hstats{display:flex;gap:18px}
.stat{display:flex;flex-direction:column;align-items:center}
.sn{font-family:'Share Tech Mono',monospace;font-size:16px;font-weight:700}
.sl{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
.live{display:flex;align-items:center;gap:6px;background:rgba(255,48,64,.12);border:1px solid rgba(255,48,64,.35);color:#ff3040;padding:4px 11px;border-radius:4px;font-size:11px;font-weight:800;letter-spacing:2px}
.dot{width:7px;height:7px;border-radius:50%;background:#ff3040;animation:blink 1.2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.1}}
.main{display:flex;flex:1;overflow:hidden}
#map{flex:1;position:relative}
.leaflet-container{background:#04080e!important}
.leaflet-tile{filter:brightness(.22) saturate(.35) hue-rotate(185deg) invert(1)!important}
#map::after{content:'';position:absolute;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,.02) 3px,rgba(0,0,0,.02) 4px);pointer-events:none;z-index:400}
.sidebar{width:285px;flex-shrink:0;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;overflow:hidden}
.rw{padding:11px 13px;border-bottom:1px solid var(--bd)}
.rl{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--dim);margin-bottom:5px}
.rs{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:7px 9px;color:var(--tx);font-family:'Tajawal',sans-serif;font-size:13px;outline:none;cursor:pointer;appearance:none}
.rs option{background:var(--sf2)}
.fw{padding:11px 13px;border-bottom:1px solid var(--bd)}
.fl{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--dim);margin-bottom:8px}
.fg{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.fb{display:flex;align-items:center;gap:7px;padding:7px 9px;border-radius:6px;border:1px solid var(--bd);background:var(--sf2);cursor:pointer;font-family:'Tajawal',sans-serif;font-size:13px;color:var(--dim);transition:all .2s;user-select:none}
.fb.on{color:var(--tx)}
.fb.on[data-t="military"]{border-color:var(--mil);background:rgba(255,48,64,.08);color:var(--mil)}
.fb.on[data-t="civil"]{border-color:var(--civ);background:rgba(0,223,106,.07);color:var(--civ)}
.fb.on[data-t="helicopter"]{border-color:var(--hel);background:rgba(255,208,0,.07);color:var(--hel)}
.fb.on[data-t="drone"]{border-color:#aaa;background:rgba(204,204,204,.06);color:#bbb}
.fd{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.sw{padding:8px 13px;border-bottom:1px solid var(--bd)}
.sinp{width:100%;background:var(--sf2);border:1px solid var(--bd);border-radius:6px;padding:7px 10px;color:var(--tx);font-family:'Tajawal',sans-serif;font-size:13px;outline:none;transition:border-color .2s;direction:rtl}
.sinp:focus{border-color:var(--ac)}
.sinp::placeholder{color:var(--dim)}
.lh{padding:8px 13px;font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--dim);border-bottom:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center}
.lc{font-family:'Share Tech Mono',monospace;color:var(--ac);font-size:12px}
.al{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--bd) transparent}
.al::-webkit-scrollbar{width:3px}
.al::-webkit-scrollbar-thumb{background:var(--bd)}
.ai{display:flex;align-items:center;gap:8px;padding:8px 13px;border-bottom:1px solid rgba(24,48,74,.4);cursor:pointer;transition:background .12s}
.ai:hover{background:var(--sf2)}
.ai.sel{background:rgba(0,200,240,.06);border-right:2px solid var(--ac)}
.ab{width:3px;height:32px;border-radius:2px;flex-shrink:0}
.an{flex:1;min-width:0}
.acs{font-family:'Share Tech Mono',monospace;font-size:12px;color:#fff;font-weight:700}
.ad{font-size:11px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.aa{font-family:'Share Tech Mono',monospace;font-size:11px;text-align:left;white-space:nowrap;line-height:1.3}
.dp{background:var(--sf2);border-top:1px solid var(--bd);max-height:0;overflow:hidden;transition:max-height .3s ease}
.dp.open{max-height:460px;overflow-y:auto}
.di{padding:12px 13px}
.dh{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--dim);margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.cx{cursor:pointer;color:var(--dim);font-size:18px;line-height:1}
.cx:hover{color:var(--tx)}
.dcs{font-family:'Share Tech Mono',monospace;font-size:18px;color:#fff;margin-bottom:8px;display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.badge{font-size:10px;padding:2px 7px;border-radius:3px;font-weight:700;letter-spacing:1px;border:1px solid}
.dg{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.df{background:var(--sf);border:1px solid var(--bd);border-radius:5px;padding:6px 8px}
.dlb{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.dv{font-family:'Share Tech Mono',monospace;font-size:12px;color:#fff}
.dv.sm{font-size:11px}
.leg{position:absolute;bottom:34px;left:12px;z-index:500;background:rgba(8,14,22,.93);border:1px solid var(--bd);border-radius:8px;padding:10px 12px;backdrop-filter:blur(10px)}
.lg-t{font-size:9px;text-transform:uppercase;letter-spacing:2px;color:var(--dim);margin-bottom:7px}
.lg-i{display:flex;align-items:center;gap:7px;font-size:12px;margin-bottom:4px}
.lg-d{width:8px;height:8px;border-radius:50%}
.leaflet-popup-content-wrapper{background:var(--sf2)!important;border:1px solid var(--bd)!important;border-radius:8px!important;color:var(--tx)!important;box-shadow:0 8px 32px rgba(0,0,0,.75)!important;font-family:'Tajawal',sans-serif!important;min-width:210px}
.leaflet-popup-tip{background:var(--sf2)!important}
.leaflet-popup-close-button{color:var(--dim)!important;font-size:18px!important}
.pc{font-family:'Share Tech Mono',monospace;font-size:15px;color:#fff;font-weight:700;margin-bottom:7px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.pg{display:grid;grid-template-columns:1fr 1fr;gap:4px}
.pf .lb{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:1px}
.pf .vl{font-family:'Share Tech Mono',monospace;font-size:12px;color:#fff}
.pf .vl.sm{font-size:10px}
.statusbar{height:25px;background:var(--sf);border-top:1px solid var(--bd);display:flex;align-items:center;padding:0 13px;gap:12px;font-size:11px;color:var(--dim);font-family:'Share Tech Mono',monospace;flex-shrink:0;z-index:1000}
.si2{display:flex;gap:4px;align-items:center}
.sep{color:var(--bd)}
#clk{color:var(--ac);margin-right:auto}
.ok{color:var(--civ)}.er{color:var(--mil)}.wa{color:#ffa000}
#load{position:absolute;inset:0;background:rgba(6,11,20,.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:3000;backdrop-filter:blur(4px)}
.sp{width:44px;height:44px;border-radius:50%;border:3px solid var(--bd);border-top-color:var(--ac);animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
.lt{font-size:13px;color:var(--tx)}
.ls{font-size:11px;color:var(--dim);margin-top:5px;text-align:center;max-width:280px}
#load.h{display:none}
#srcB{background:rgba(0,200,240,.08);border:1px solid rgba(0,200,240,.25);color:var(--ac);padding:1px 8px;border-radius:3px;font-size:10px}
#srcB.demo{background:rgba(255,160,0,.1);border-color:rgba(255,160,0,.4);color:#ffa000}
#modeBanner{display:none;position:absolute;top:10px;left:50%;transform:translateX(-50%);padding:5px 14px;border-radius:5px;font-size:11px;z-index:2000;white-space:nowrap}
#modeBanner.real{display:block;background:rgba(0,223,106,.12);border:1px solid rgba(0,223,106,.35);color:var(--civ)}
#modeBanner.demo{display:block;background:rgba(255,160,0,.12);border:1px solid rgba(255,160,0,.35);color:#ffa000}

/* Worker setup banner */
#setupBanner{
  background:rgba(0,200,240,.07);border-bottom:1px solid rgba(0,200,240,.2);
  padding:7px 14px;font-size:12px;color:var(--ac);text-align:center;
  display:flex;align-items:center;justify-content:center;gap:10px;flex-shrink:0;
}
#setupBanner.h{display:none}
#workerInput{
  background:var(--sf2);border:1px solid var(--bd);border-radius:5px;
  padding:4px 10px;color:var(--tx);font-family:'Share Tech Mono',monospace;
  font-size:11px;outline:none;width:280px;direction:ltr;
}
#workerInput:focus{border-color:var(--ac)}
.connect-btn{
  background:var(--ac);color:#000;border:none;border-radius:5px;
  padding:5px 12px;font-family:'Tajawal',sans-serif;font-size:12px;
  font-weight:700;cursor:pointer;
}
</style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 32 32" fill="none">
      <circle cx="16" cy="16" r="15" stroke="#18304a" stroke-width="1.4"/>
      <circle cx="16" cy="16" r="9" stroke="#1a3a5c" stroke-width=".9" stroke-dasharray="2 3"/>
      <line x1="16" y1="3" x2="16" y2="29" stroke="#18304a" stroke-width=".6"/>
      <line x1="3" y1="16" x2="29" y2="16" stroke="#18304a" stroke-width=".6"/>
      <path d="M16 8 L18.5 13 L25 13.5 L21 17 L22.5 24 L16 21 L9.5 24 L11 17 L7 13.5 L13.5 13 Z" fill="#00c8f0" opacity=".85"/>
      <circle cx="16" cy="16" r="2.2" fill="#00c8f0"/>
    </svg>
    <div class="logo-t">Sky<span>Watch</span></div>
  </div>
  <div class="hstats">
    <div class="stat"><div class="sn" id="st0" style="color:var(--ac)">—</div><div class="sl">إجمالي</div></div>
    <div class="stat"><div class="sn" id="st1" style="color:var(--mil)">—</div><div class="sl">عسكري</div></div>
    <div class="stat"><div class="sn" id="st2" style="color:var(--civ)">—</div><div class="sl">مدني</div></div>
    <div class="stat"><div class="sn" id="st3" style="color:var(--hel)">—</div><div class="sl">حوامة</div></div>
    <div class="stat"><div class="sn" id="st4" style="color:#aaa">—</div><div class="sl">مسيّرة</div></div>
  </div>
  <div class="live"><div class="dot"></div>LIVE</div>
</header>

<!-- Worker URL input -->
<div id="setupBanner">
  <span>🔗 أدخل رابط Cloudflare Worker للبيانات الحقيقية:</span>
  <input id="workerInput" type="text" placeholder="https://lucky-frog-9ff0.ahmedjassim300.workers.dev" dir="ltr">
  <button class="connect-btn" onclick="connectWorker()">اتصال</button>
  <button onclick="document.getElementById('setupBanner').classList.add('h')" style="background:none;border:none;color:var(--dim);cursor:pointer;font-size:16px">×</button>
</div>

<div class="main">
  <div id="map">
    <div id="load">
      <div class="sp"></div>
      <div class="lt" id="ldTxt">جارٍ تحميل البيانات...</div>
      <div class="ls" id="ldSub"></div>
    </div>
    <div id="modeBanner"></div>
    <div class="leg">
      <div class="lg-t">نوع الطائرة</div>
      <div class="lg-i"><div class="lg-d" style="background:var(--mil);box-shadow:0 0 5px var(--mil)"></div>عسكري</div>
      <div class="lg-i"><div class="lg-d" style="background:var(--civ);box-shadow:0 0 5px var(--civ)"></div>مدني</div>
      <div class="lg-i"><div class="lg-d" style="background:var(--hel);box-shadow:0 0 5px var(--hel)"></div>حوامة</div>
      <div class="lg-i"><div class="lg-d" style="background:#bbb"></div>مسيّرة</div>
    </div>
  </div>

  <div class="sidebar">
    <div class="rw">
      <div class="rl">منطقة المراقبة</div>
      <select class="rs" id="regSel" onchange="changeRegion()">
        <option value="gulf">الخليج العربي</option>
        <option value="saudi">المملكة العربية السعودية</option>
        <option value="middleeast">الشرق الأوسط</option>
        <option value="levant">بلاد الشام والعراق</option>
        <option value="europe">أوروبا</option>
        <option value="northamerica">أمريكا الشمالية</option>
        <option value="eastasia">شرق آسيا</option>
      </select>
    </div>
    <div class="fw">
      <div class="fl">تصفية حسب النوع</div>
      <div class="fg">
        <button class="fb on" data-t="military"   onclick="toggleF(this)"><div class="fd" style="background:var(--mil);box-shadow:0 0 5px var(--mil)"></div>عسكري</button>
        <button class="fb on" data-t="civil"      onclick="toggleF(this)"><div class="fd" style="background:var(--civ);box-shadow:0 0 5px var(--civ)"></div>مدني</button>
        <button class="fb on" data-t="helicopter" onclick="toggleF(this)"><div class="fd" style="background:var(--hel);box-shadow:0 0 5px var(--hel)"></div>حوامة</button>
        <button class="fb on" data-t="drone"      onclick="toggleF(this)"><div class="fd" style="background:#bbb"></div>مسيّرة</button>
      </div>
    </div>
    <div class="sw">
      <input class="sinp" id="srch" type="text" placeholder="بحث: callsign، دولة، ICAO..." oninput="doSearch(this.value)">
    </div>
    <div class="lh"><span>الطائرات المرصودة</span><span class="lc" id="lcnt">0</span></div>
    <div class="al" id="aList"></div>
    <div class="dp" id="dPanel"><div class="di" id="dInner"></div></div>
  </div>
</div>

<div class="statusbar">
  <div id="clk">00:00:00 UTC</div>
  <div class="si2"><span class="ok" id="cDot">●</span><span id="cTxt">جارٍ الاتصال</span></div>
  <div class="sep">|</div>
  <div class="si2">تحديث: <span id="cdTxt" style="color:var(--ac)">—</span></div>
  <div class="sep">|</div>
  <span id="srcB">—</span>
  <div class="sep">|</div>
  <span id="acC" style="color:var(--dim)">—</span>
</div>

<script>
// ═══════════════════════════════════════════════════
//  WORKER URL — غيّره بعد نشر Cloudflare Worker
// ═══════════════════════════════════════════════════
let WORKER_URL = localStorage.getItem("workerUrl") || "";

function connectWorker() {
  const val = document.getElementById("workerInput").value.trim();
  if (!val) return;
  WORKER_URL = val.replace(/\/$/, "");
  localStorage.setItem("workerUrl", WORKER_URL);
  document.getElementById("setupBanner").classList.add("h");
  document.getElementById("ldTxt").textContent = "جارٍ الاتصال بـ Worker...";
  document.getElementById("load").classList.remove("h");
  update();
}

// إذا كان هناك Worker محفوظ أخفِ البانر
if (WORKER_URL) {
  document.getElementById("workerInput").value = WORKER_URL;
}

// ═══════════════════════════════════════════════════
//  REGIONS
// ═══════════════════════════════════════════════════
const REGIONS = {
  gulf:         {lat:26,   lon:52,  zoom:6},
  saudi:        {lat:23.5, lon:44,  zoom:6},
  middleeast:   {lat:28,   lon:43,  zoom:5},
  levant:       {lat:33.5, lon:39,  zoom:6},
  europe:       {lat:51,   lon:10,  zoom:5},
  northamerica: {lat:45,   lon:-93, zoom:4},
  eastasia:     {lat:35,   lon:120, zoom:5},
};
let curReg = "gulf";

// ═══════════════════════════════════════════════════
//  MILITARY DETECTION
// ═══════════════════════════════════════════════════
const MIL_CS = ["RCH","CNV","DUKE","VIPER","EAGLE","HAWK","GHOST","MAGIC","REACH","SPAR","SAM","VENUS","BLADE","IRON","BONE","DOOM","WAR","GRIM","WOLF","TIGER","ANGEL","KING","PAVE","VALOR","SWORD","SHIELD","LANCE","MULE","JAKE","RSAF","RSNF","QTAR","BAHM","UAEF","COBRA","DEMON","TALON","STORM","FLASH","FURY","RAVEN","FALCON"];
const MIL_HEX = [[0xAE0000,0xAEFFFF],[0x43C000,0x43CFFF],[0x3A8000,0x3AFFFF],[0x357000,0x3573FF],[0x480000,0x487FFF],[0x68A000,0x68AFFF],[0x896000,0x896FFF]];

function isMil(hex, cs, cat) {
  if (cat === 7) return true;
  const n = parseInt(hex || "0", 16);
  for (let i = 0; i < MIL_HEX.length; i++) { if (n >= MIL_HEX[i][0] && n <= MIL_HEX[i][1]) return true; }
  if (cs) { const u = cs.trim().toUpperCase(); for (let i = 0; i < MIL_CS.length; i++) { if (u.indexOf(MIL_CS[i]) === 0) return true; } }
  return false;
}

function classify(ac) {
  const cat = typeof ac.category === "string" ? parseInt(ac.category, 16) : (ac.category || 0);
  if (cat === 8) return "helicopter";
  if (cat === 14 || cat === 9 || cat === 10 || cat === 11 || cat === 12) return "drone";
  if (isMil(ac.hex || "", ac.cs, cat)) return "military";
  return "civil";
}

// ═══════════════════════════════════════════════════
//  NORMALISE
// ═══════════════════════════════════════════════════
function norm(r) {
  const lat = r.lat, lon = r.lon || r.lng;
  if (lat == null || lon == null) return null;
  const alt = r.alt_baro === "ground" ? 0 : (r.alt_baro != null ? r.alt_baro : (r.alt_geom != null ? r.alt_geom : null));
  return {
    hex: (r.hex || r.icao24 || "").toLowerCase(),
    cs: (r.flight || r.callsign || "").trim() || null,
    lat: lat, lon: lon,
    alt: typeof alt === "number" ? Math.round(alt) : alt,
    spd: r.gs != null ? r.gs : (r.velocity != null ? Math.round(r.velocity * 1.944) : null),
    trk: r.track != null ? r.track : r.true_track,
    vr: r.baro_rate != null ? r.baro_rate : r.vert_rate,
    sqk: r.squawk || null,
    country: r.r_country || r.origin_country || null,
    model: r.t || r.type_code || null,
    reg: r.r || null,
    category: r.category || 0,
  };
}

// ═══════════════════════════════════════════════════
//  MAP
// ═══════════════════════════════════════════════════
const R0 = REGIONS.gulf;
const map = L.map("map", {center:[R0.lat,R0.lon], zoom:R0.zoom, zoomControl:false, attributionControl:false});
L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {maxZoom:19}).addTo(map);
L.control.zoom({position:"bottomleft"}).addTo(map);

const COLORS = {military:"#ff3040", civil:"#00df6a", helicopter:"#ffd000", drone:"#cccccc"};
const LABELS  = {military:"عسكري", civil:"مدني", helicopter:"حوامة", drone:"مسيّرة"};

let aircraft={}, markers={};
let filters = new Set(["military","civil","helicopter","drone"]);
let searchQ="", selId=null, timer=null, cd=15, isReal=false;

// ═══════════════════════════════════════════════════
//  ICONS
// ═══════════════════════════════════════════════════
function mkIcon(type, track) {
  const c = COLORS[type], r = track || 0;
  let body;
  if (type === "helicopter") {
    body = "<g transform=\"rotate(" + r + ",12,12)\"><ellipse cx=\"12\" cy=\"12\" rx=\"3.2\" ry=\"5\" fill=\"" + c + "\"/><line x1=\"3\" y1=\"12\" x2=\"21\" y2=\"12\" stroke=\"" + c + "\" stroke-width=\"2\" stroke-linecap=\"round\"/><line x1=\"9\" y1=\"7.5\" x2=\"15\" y2=\"7.5\" stroke=\"" + c + "\" stroke-width=\"1.4\" stroke-linecap=\"round\"/></g>";
  } else if (type === "drone") {
    body = "<g transform=\"rotate(" + r + ",12,12)\"><rect x=\"8.5\" y=\"9.5\" width=\"7\" height=\"5\" rx=\"1\" fill=\"" + c + "\"/><line x1=\"3\" y1=\"7\" x2=\"8.5\" y2=\"9.5\" stroke=\"" + c + "\" stroke-width=\"1.3\"/><line x1=\"21\" y1=\"7\" x2=\"15.5\" y2=\"9.5\" stroke=\"" + c + "\" stroke-width=\"1.3\"/><line x1=\"3\" y1=\"17\" x2=\"8.5\" y2=\"14.5\" stroke=\"" + c + "\" stroke-width=\"1.3\"/><line x1=\"21\" y1=\"17\" x2=\"15.5\" y2=\"14.5\" stroke=\"" + c + "\" stroke-width=\"1.3\"/><circle cx=\"3\" cy=\"7\" r=\"1.8\" fill=\"" + c + "\"/><circle cx=\"21\" cy=\"7\" r=\"1.8\" fill=\"" + c + "\"/><circle cx=\"3\" cy=\"17\" r=\"1.8\" fill=\"" + c + "\"/><circle cx=\"21\" cy=\"17\" r=\"1.8\" fill=\"" + c + "\"/></g>";
  } else {
    body = "<g transform=\"rotate(" + (r - 90) + ",12,12)\"><path d=\"M12 3 L14.5 9 L21 9.5 L17 13.5 L18.5 21 L12 17.5 L5.5 21 L7 13.5 L3 9.5 L9.5 9 Z\" fill=\"" + c + "\"/></g>";
  }
  const svg = "<svg xmlns=\"http://www.w3.org/2000/svg\" width=\"24\" height=\"24\" viewBox=\"0 0 24 24\"><circle cx=\"12\" cy=\"12\" r=\"11\" fill=\"none\" stroke=\"" + c + "\" stroke-width=\"1.1\" opacity=\".22\"/>" + body + "</svg>";
  return L.divIcon({html:svg, className:"", iconSize:[24,24], iconAnchor:[12,12]});
}

// ═══════════════════════════════════════════════════
//  POPUP & DETAIL
// ═══════════════════════════════════════════════════
function altS(v) { if (v===0||v==="ground") return "على الأرض"; if (!v&&v!==0) return "—"; return Math.round(v).toLocaleString()+" ft"; }
function spdS(v) { return v ? Math.round(v)+" kts" : "—"; }
function trkS(v) { return v != null ? Math.round(v)+"°" : "—"; }
function vrS(v)  { if (!v&&v!==0) return "—"; return (v>0?"↑ ":v<0?"↓ ":"→ ")+Math.abs(Math.round(v))+" ft/m"; }

function popHtml(a) {
  const c = COLORS[a.type];
  return "<div><div class=\"pc\">" + (a.cs||a.hex.toUpperCase()) + " <span class=\"badge\" style=\"border-color:"+c+";color:"+c+";background:"+c+"18\">" + LABELS[a.type] + "</span></div>" +
    "<div class=\"pg\">" +
    "<div class=\"pf\"><div class=\"lb\">ICAO24</div><div class=\"vl\">" + a.hex.toUpperCase() + "</div></div>" +
    "<div class=\"pf\"><div class=\"lb\">الدولة</div><div class=\"vl sm\">" + (a.country||"—") + "</div></div>" +
    "<div class=\"pf\"><div class=\"lb\">الارتفاع</div><div class=\"vl\" style=\"color:"+c+"\">" + altS(a.alt) + "</div></div>" +
    "<div class=\"pf\"><div class=\"lb\">السرعة</div><div class=\"vl\" style=\"color:"+c+"\">" + spdS(a.spd) + "</div></div>" +
    "<div class=\"pf\"><div class=\"lb\">الاتجاه</div><div class=\"vl\">" + trkS(a.trk) + "</div></div>" +
    "<div class=\"pf\"><div class=\"lb\">Squawk</div><div class=\"vl\">" + (a.sqk||"—") + "</div></div>" +
    "</div>" + (a.alt===0||a.alt==="ground" ? "<div style=\"margin-top:6px;font-size:11px;color:#ffd000\">⬛ على الأرض</div>" : "") + "</div>";
}

function showDetail(a) {
  const c = COLORS[a.type];
  document.getElementById("dInner").innerHTML =
    "<div class=\"dh\"><span>تفاصيل الطائرة</span><span class=\"cx\" onclick=\"closeDetail()\">×</span></div>" +
    "<div class=\"dcs\">" + (a.cs||a.hex.toUpperCase()) + " <span class=\"badge\" style=\"border-color:"+c+";color:"+c+";background:"+c+"18\">" + LABELS[a.type] + "</span>" +
    (a.alt===0||a.alt==="ground" ? "<span class=\"badge\" style=\"border-color:#ffd000;color:#ffd000;background:rgba(255,208,0,.09)\">على الأرض</span>" : "") + "</div>" +
    "<div class=\"dg\">" +
    "<div class=\"df\"><div class=\"dlb\">ICAO 24-bit</div><div class=\"dv\">" + a.hex.toUpperCase() + "</div></div>" +
    "<div class=\"df\"><div class=\"dlb\">دولة التسجيل</div><div class=\"dv sm\">" + (a.country||"—") + "</div></div>" +
    "<div class=\"df\"><div class=\"dlb\">رقم الرحلة</div><div class=\"dv sm\">" + (a.cs||"—") + "</div></div>" +
    "<div class=\"df\"><div class=\"dlb\">الطراز</div><div class=\"dv sm\">" + (a.model||"—") + "</div></div>" +
    "<div class=\"df\"><div class=\"dlb\">الارتفاع</div><div class=\"dv\" style=\"color:"+c+"\">" + altS(a.alt) + "</div></div>" +
    "<div class=\"df\"><div class=\"dlb\">السرعة</div><div class=\"dv\" style=\"color:"+c+"\">" + spdS(a.spd) + "</div></div>" +
    "<div class=\"df\"><div class=\"dlb\">الاتجاه</div><div class=\"dv\">" + trkS(a.trk) + "</div></div>" +
    "<div class=\"df\"><div class=\"dlb\">صعود/نزول</div><div class=\"dv sm\">" + vrS(a.vr) + "</div></div>" +
    "<div class=\"df\"><div class=\"dlb\">Squawk</div><div class=\"dv\">" + (a.sqk||"—") + "</div></div>" +
    "<div class=\"df\"><div class=\"dlb\">التسجيل</div><div class=\"dv sm\">" + (a.reg||"—") + "</div></div>" +
    "<div class=\"df\"><div class=\"dlb\">خط العرض</div><div class=\"dv sm\">" + (a.lat?a.lat.toFixed(4)+"°":"—") + "</div></div>" +
    "<div class=\"df\"><div class=\"dlb\">خط الطول</div><div class=\"dv sm\">" + (a.lon?a.lon.toFixed(4)+"°":"—") + "</div></div>" +
    "</div>";
  document.getElementById("dPanel").classList.add("open");
}
function closeDetail() { selId=null; document.getElementById("dPanel").classList.remove("open"); renderList(); }

// ═══════════════════════════════════════════════════
//  LIST & MARKERS
// ═══════════════════════════════════════════════════
function visible(a) {
  if (!filters.has(a.type)) return false;
  if (!searchQ) return true;
  const q = searchQ.toLowerCase();
  return (a.cs&&a.cs.toLowerCase().indexOf(q)>=0) || a.hex.toLowerCase().indexOf(q)>=0 || (a.country&&a.country.toLowerCase().indexOf(q)>=0);
}

function renderList() {
  const ul = document.getElementById("aList");
  ul.innerHTML = "";
  let n = 0;
  const arr = Object.values(aircraft).sort(function(a,b){ return ((typeof b.alt==="number"?b.alt:0)-(typeof a.alt==="number"?a.alt:0)); });
  arr.forEach(function(a) {
    if (!visible(a)) return;
    n++;
    const c = COLORS[a.type];
    const altD = a.alt===0||a.alt==="ground" ? "GND" : (typeof a.alt==="number" ? (a.alt/1000).toFixed(1)+"k" : "—");
    const div = document.createElement("div");
    div.className = "ai" + (selId===a.hex ? " sel" : "");
    div.innerHTML = "<div class=\"ab\" style=\"background:"+c+"\"></div><div class=\"an\"><div class=\"acs\">"+(a.cs||a.hex.toUpperCase())+"</div><div class=\"ad\">"+(a.country||"")+(a.model?" · "+a.model:"")+"</div></div><div class=\"aa\" style=\"color:"+c+"\">"+altD+"<br><span style=\"color:var(--dim);font-size:9px\">ft</span></div>";
    div.onclick = function() { selectAc(a.hex); };
    ul.appendChild(div);
  });
  document.getElementById("lcnt").textContent = n;
}

function selectAc(id) {
  selId = id;
  const a = aircraft[id];
  if (!a) return;
  if (a.lat&&a.lon) map.setView([a.lat,a.lon], Math.max(map.getZoom(),8));
  if (markers[id]) markers[id].openPopup();
  showDetail(a);
  renderList();
}

function refreshMarkers() {
  const ids = Object.keys(markers);
  for (let i=0;i<ids.length;i++) {
    if (!aircraft[ids[i]]||!visible(aircraft[ids[i]])) { map.removeLayer(markers[ids[i]]); delete markers[ids[i]]; }
  }
  const acs = Object.values(aircraft);
  for (let i=0;i<acs.length;i++) {
    const a = acs[i];
    if (!visible(a)||!a.lat||!a.lon) continue;
    const icon = mkIcon(a.type, a.trk);
    if (markers[a.hex]) {
      markers[a.hex].setLatLng([a.lat,a.lon]);
      markers[a.hex].setIcon(icon);
      markers[a.hex].setPopupContent(popHtml(a));
    } else {
      const m = L.marker([a.lat,a.lon], {icon:icon, title:a.cs||a.hex});
      m.bindPopup(popHtml(a), {maxWidth:250, className:""});
      m.on("click", (function(hex){ return function(){ selectAc(hex); }; })(a.hex));
      m.addTo(map);
      markers[a.hex] = m;
    }
  }
}

// ═══════════════════════════════════════════════════
//  PROCESS
// ═══════════════════════════════════════════════════
function processRaw(rawArr, srcName) {
  aircraft = {};
  const ids = Object.keys(markers);
  for (let i=0;i<ids.length;i++) { map.removeLayer(markers[ids[i]]); }
  markers = {};
  const cnt = {military:0, civil:0, helicopter:0, drone:0};
  for (let i=0;i<rawArr.length;i++) {
    const a = norm(rawArr[i]);
    if (!a||!a.hex) continue;
    a.type = classify(a);
    aircraft[a.hex] = a;
    cnt[a.type]++;
  }
  const tot = Object.keys(aircraft).length;
  document.getElementById("st0").textContent = tot;
  document.getElementById("st1").textContent = cnt.military;
  document.getElementById("st2").textContent = cnt.civil;
  document.getElementById("st3").textContent = cnt.helicopter;
  document.getElementById("st4").textContent = cnt.drone;
  document.getElementById("acC").textContent = tot + " طائرة";
  const sb = document.getElementById("srcB");
  sb.textContent = srcName;
  sb.className = isReal ? "" : "demo";
  refreshMarkers();
  renderList();
}

// ═══════════════════════════════════════════════════
//  FETCH
// ═══════════════════════════════════════════════════
async function fetchData() {
  if (!WORKER_URL) throw new Error("no-worker");
  const url = WORKER_URL + "/?region=" + curReg;
  const ctl = new AbortController();
  const tid = setTimeout(function(){ ctl.abort(); }, 10000);
  const resp = await fetch(url, {signal: ctl.signal});
  clearTimeout(tid);
  if (!resp.ok) throw new Error("http-" + resp.status);
  const data = await resp.json();
  if (data.error) throw new Error(data.error);
  const ac = data.ac || data.aircraft || [];
  if (!Array.isArray(ac) || ac.length === 0) throw new Error("empty");
  return {ac: ac, source: data.source || WORKER_URL};
}

// ═══════════════════════════════════════════════════
//  DEMO DATA
// ═══════════════════════════════════════════════════
function makeDemo() {
  const reg = REGIONS[curReg];
  const types = ["civil","civil","civil","civil","military","helicopter","drone"];
  const milCS = ["REACH301","EAGLE21","RCH456","DUKE99","VIPER11","MAGIC31","RSAF01"];
  const civCS = ["SVA123","UAE456","QTR789","NAS321","FBA654","MSR987","BAH111"];
  const mods  = ["Boeing 737-800","Airbus A320","Boeing 777","Airbus A380","Boeing 787"];
  const cntrs = ["Saudi Arabia","UAE","Qatar","Kuwait","Bahrain","Egypt","Jordan","Iraq"];
  const arr = [];
  for (let i=0;i<50;i++) {
    const type = types[i % types.length];
    arr.push({
      hex: Math.floor(Math.random()*0xFFFFFF).toString(16).padStart(6,"0"),
      flight: type==="military"?milCS[i%milCS.length]:type==="civil"?civCS[i%civCS.length]:type==="helicopter"?"HELI"+(10+i):"UAV"+(100+i),
      lat: reg.lat + (Math.random()-0.5)*12,
      lon: reg.lon + (Math.random()-0.5)*14,
      alt_baro: type==="helicopter"?800+Math.floor(Math.random()*2000):type==="drone"?12000+Math.floor(Math.random()*15000):25000+Math.floor(Math.random()*14000),
      gs: type==="helicopter"?90+Math.floor(Math.random()*100):380+Math.floor(Math.random()*180),
      track: Math.floor(Math.random()*360),
      baro_rate: (Math.random()-0.5)*800,
      squawk: (1000+Math.floor(Math.random()*6777)).toString(),
      r_country: cntrs[i%cntrs.length],
      t: type==="civil"?mods[i%mods.length]:null,
      category: type==="helicopter"?8:type==="drone"?14:0,
    });
  }
  return arr;
}

// ═══════════════════════════════════════════════════
//  UPDATE
// ═══════════════════════════════════════════════════
async function update() {
  try {
    const result = await fetchData();
    isReal = true;
    processRaw(result.ac, "Worker ✅");
    document.getElementById("cDot").className = "ok";
    document.getElementById("cTxt").textContent = "✅ بيانات حقيقية";
    const b = document.getElementById("modeBanner");
    b.className = "real";
    b.textContent = "✅ بيانات ADS-B حقيقية مباشرة";
    setTimeout(function(){ b.className=""; }, 4000);
  } catch(e) {
    isReal = false;
    processRaw(makeDemo(), "تجريبي ⚠️");
    document.getElementById("cDot").className = "wa";
    if (e.message === "no-worker") {
      document.getElementById("cTxt").textContent = "أدخل رابط Worker أعلاه";
      const b = document.getElementById("modeBanner");
      b.className = "demo";
      b.textContent = "⚠️ أدخل رابط Cloudflare Worker للبيانات الحقيقية";
    } else {
      document.getElementById("cTxt").textContent = "⚠️ وضع تجريبي";
      const b = document.getElementById("modeBanner");
      b.className = "demo";
      b.textContent = "⚠️ بيانات تجريبية — تحقق من رابط Worker";
    }
  }
  document.getElementById("load").classList.add("h");
}

const REFRESH = 15;
function startTimer() {
  if (timer) clearInterval(timer);
  cd = REFRESH;
  timer = setInterval(function(){
    cd--;
    document.getElementById("cdTxt").textContent = cd + "s";
    if (cd <= 0) { cd = REFRESH; update(); }
  }, 1000);
}

function toggleF(btn) {
  const t = btn.dataset.t;
  if (filters.has(t)) { filters.delete(t); btn.classList.remove("on"); }
  else { filters.add(t); btn.classList.add("on"); }
  refreshMarkers(); renderList();
}
function doSearch(v) { searchQ = v.trim(); refreshMarkers(); renderList(); }
function changeRegion() {
  curReg = document.getElementById("regSel").value;
  const r = REGIONS[curReg];
  map.setView([r.lat,r.lon], r.zoom);
  document.getElementById("load").classList.remove("h");
  const ids = Object.keys(markers);
  for (let i=0;i<ids.length;i++) { map.removeLayer(markers[ids[i]]); }
  markers = {}; aircraft = {}; renderList();
  update();
}

function tick() {
  const d = new Date();
  document.getElementById("clk").textContent =
    String(d.getUTCHours()).padStart(2,"0")+":"+
    String(d.getUTCMinutes()).padStart(2,"0")+":"+
    String(d.getUTCSeconds()).padStart(2,"0")+" UTC";
}
setInterval(tick, 1000); tick();

update().then(function(){ startTimer(); });
</script>
